<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game</title>
    <style>
      body {
        height: 100vh;
        width: 100vw;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: rgb(125, 145, 145);
      }
      canvas {
        border: 3px solid black;
        border-radius: 1px;
        width: 42.1vh;
        height: 70vh;
      }
      #game-over {
        color: white;
        font-family: Verdana;
        position: absolute;
        font-size: 12px;
        background-color: rgb(253, 178, 39);
        width: 30vh;
        height: 30vh;
        top: 20vh;
        left: 6.5vh;
        opacity: 0.95;
        border-width: 2px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-items: flex-start;
        row-gap: 0px;
        border: solid 3px orange;
        border-radius: 3px;

        visibility: hidden;
      }
      #game-over h1 {
        height: 10px;
      }
      #game-over p {
        height: 10px;
        font-size: 23px;
        font-weight: bold;
      }
      #reset {
        font-weight: bold;
        margin-top: 10px;
        margin-bottom: 10px;
        width: 50%;
        height: 15%;
        border-radius: 4px;
        background-color: rgb(255, 226, 138);
        border: solid 2px orange;
      }
      #reset:hover {
        background-color: rgb(255, 243, 130);
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div style="position: relative">
      <canvas id="canvas"></canvas>
      <div id="game-over">
        <h1>BEST SCORE</h1>
        <p id="best">top</p>
        <h1>YOUR SCORE</h1>
        <p id="score">prev</p>
        <button id="reset">Play again</button>
      </div>
    </div>
  </body>
  <script src="game.js"></script>
</html>
